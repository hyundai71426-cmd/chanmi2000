<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>찬미예수 2000 악보 검색</title>
<style>
  :root {
    --bg: #f8f5f0;
    --card: #ffffff;
    --accent: #5b3c88;
    --accent-light: #7e55b0;
    --text: #2d2d2d;
    --sub: #6b6b6b;
    --border: #e0d9f0;
    --hover: #f0ebfa;
    --shadow: 0 2px 12px rgba(91,60,136,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-light) 100%);
    color: #fff; padding: 28px 20px 22px; text-align: center;
    box-shadow: 0 3px 12px rgba(91,60,136,0.25);
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
  header p  { font-size: 0.85rem; opacity: 0.85; }

  .search-wrap { max-width: 680px; margin: 24px auto 0; padding: 0 16px; position: relative; }
  .search-wrap input {
    width: 100%; padding: 14px 48px 14px 18px;
    border: 2px solid var(--border); border-radius: 32px;
    font-size: 1rem; outline: none; background: var(--card); color: var(--text);
    box-shadow: var(--shadow); transition: border-color .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .clear-btn {
    position: absolute; right: 32px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer; font-size: 1.1rem; color: var(--sub); display: none;
  }
  .search-wrap input:not(:placeholder-shown) ~ .clear-btn { display: block; }

  .filter-row { max-width: 680px; margin: 12px auto 0; padding: 0 16px; display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn { padding: 6px 16px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--card); color: var(--sub); font-size: 0.85rem; cursor: pointer; transition: all .15s; }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .result-info { max-width: 680px; margin: 14px auto 6px; padding: 0 18px; font-size: 0.82rem; color: var(--sub); }

  .list-wrap { max-width: 680px; margin: 0 auto 100px; padding: 0 12px; }
  .song-item {
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 14px 18px; margin-bottom: 8px; cursor: pointer;
    display: flex; align-items: center; gap: 16px;
    transition: background .15s, box-shadow .15s; box-shadow: var(--shadow);
  }
  .song-item:hover { background: var(--hover); box-shadow: 0 4px 18px rgba(91,60,136,0.15); }
  .song-num { min-width: 52px; text-align: center; background: var(--accent); color: #fff; border-radius: 8px; padding: 6px 4px; font-size: 0.9rem; font-weight: 700; }
  .song-info { flex: 1; min-width: 0; }
  .song-title { font-size: 0.97rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .song-lyrics-preview { font-size: 0.78rem; color: var(--sub); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .song-arrow { color: var(--accent); font-size: 1.1rem; }
  .no-result { text-align: center; padding: 60px 20px; color: var(--sub); font-size: 0.95rem; }

  /* ── 모달 ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); z-index: 500;
    justify-content: center; align-items: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }

  .modal-box {
    background: var(--card); border-radius: 16px; overflow: hidden;
    width: min(1100px, 96vw);
    height: min(90vh, 800px);
    display: flex; flex-direction: column;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }

  /* 헤더 */
  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 18px; border-bottom: 1px solid var(--border);
    flex-shrink: 0; gap: 12px; background: var(--card);
  }
  .modal-title { font-size: 1rem; font-weight: 700; color: var(--accent); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .modal-nav { display: flex; gap: 8px; flex-shrink: 0; }
  .modal-nav button, .modal-close {
    background: none; border: 1.5px solid var(--border); border-radius: 8px;
    padding: 5px 12px; cursor: pointer; font-size: 0.85rem; color: var(--text); transition: all .15s;
  }
  .modal-nav button:hover { background: var(--hover); border-color: var(--accent); color: var(--accent); }
  .modal-close { color: #999; flex-shrink: 0; }
  .modal-close:hover { background: #fee; border-color: #f00; color: #f00; }

  /* 본문 — 좌우 분할 */
  .modal-body {
    display: flex; flex: 1; overflow: hidden;
  }

  /* 왼쪽: 악보 */
  .modal-score {
    flex: 1; min-width: 0;
    display: flex; align-items: center; justify-content: center;
    background: #eee; overflow: hidden; position: relative;
  }
  .modal-score img {
    max-width: 100%; max-height: 100%;
    width: auto; height: auto;
    object-fit: contain; display: block;
    border-radius: 4px;
  }
  .modal-loading {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: var(--sub); gap: 10px; font-size: 0.9rem;
  }
  .modal-error { padding: 30px; text-align: center; color: #c00; font-size: 0.9rem; }

  /* 구분선 */
  .modal-divider {
    width: 1px; background: var(--border); flex-shrink: 0;
  }

  /* 오른쪽: 가사 */
  .modal-lyrics {
    width: 300px; flex-shrink: 0;
    overflow-y: auto; padding: 20px 18px;
    background: var(--card);
  }
  .modal-lyrics h3 {
    font-size: 0.78rem; font-weight: 700; color: var(--accent);
    letter-spacing: 0.08em; text-transform: uppercase;
    margin-bottom: 14px; padding-bottom: 8px;
    border-bottom: 2px solid var(--border);
  }
  .lyrics-verse {
    margin-bottom: 16px;
    padding: 12px 14px;
    background: var(--hover);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    font-size: 0.88rem;
    line-height: 1.9;
    color: var(--text);
  }
  .lyrics-verse:last-child { margin-bottom: 0; }
  .lyrics-break { height: 4px; }
  .no-lyrics { text-align: center; padding: 40px 10px; color: var(--sub); font-size: 0.85rem; }

  .spinner { width: 32px; height: 32px; border: 4px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .top-btn {
    position: fixed; bottom: 24px; right: 20px;
    background: var(--accent); color: #fff; border: none;
    border-radius: 50%; width: 44px; height: 44px;
    font-size: 1.2rem; cursor: pointer;
    box-shadow: 0 3px 12px rgba(91,60,136,0.35);
    display: none;
  }
  .top-btn.show { display: block; }

  /* 모바일: 위아래로 전환 */
  @media (max-width: 600px) {
    .modal-box { width: 98vw; height: 92vh; }
    .modal-body { flex-direction: column; }
    .modal-score { flex: 0 0 55%; }
    .modal-divider { width: 100%; height: 1px; }
    .modal-lyrics { width: 100%; flex: 1; }
  }
</style>
</head>
<body>

<header>
  <h1>🎵 찬미예수 2000 악보 검색</h1>
  <p>악보를 번호, 제목, 가사로 빠르게 찾아보세요</p>
</header>

<div class="search-wrap">
  <input type="search" id="searchInput" placeholder="번호·제목·가사로 검색..." autocomplete="off">
  <button class="clear-btn" onclick="clearSearch()">✕</button>
</div>

<div class="filter-row">
  <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
  <button class="filter-btn" onclick="setFilter('number', this)">번호</button>
  <button class="filter-btn" onclick="setFilter('title', this)">제목</button>
  <button class="filter-btn" onclick="setFilter('lyrics', this)">가사</button>
</div>

<div class="result-info" id="resultInfo"></div>
<div class="list-wrap" id="songList"></div>

<!-- 모달: 악보(좌) + 가사(우) -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">악보 보기</span>
      <div class="modal-nav">
        <button onclick="navigate(-1)">◀ 이전</button>
        <button onclick="navigate(1)">다음 ▶</button>
      </div>
      <button class="modal-close" onclick="closeModal()">✕ 닫기</button>
    </div>

    <div class="modal-body">
      <!-- 왼쪽: 악보 -->
      <div class="modal-score" id="modalScore">
        <div class="modal-loading"><div class="spinner"></div>불러오는 중...</div>
      </div>

      <!-- 구분선 -->
      <div class="modal-divider"></div>

      <!-- 오른쪽: 가사 -->
      <div class="modal-lyrics" id="modalLyrics">
        <h3>📝 가사</h3>
        <div id="lyricsContent"></div>
      </div>
    </div>
  </div>
</div>

<button class="top-btn" id="topBtn" onclick="scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
let allSongs = [], filtered = [], currentFilter = 'all', currentIndex = 0;

async function init() {
  try {
    const res = await fetch('songs.json');
    if (!res.ok) throw new Error();
    allSongs = await res.json();
  } catch {
    allSongs = [];
    for (let i = 1; i <= 2062; i++) allSongs.push({ number: i, title: `곡 ${i}`, lyrics: '', lyrics_full: '' });
  }
  render(allSongs);
}

document.getElementById('searchInput').addEventListener('input', debounce(onSearch, 200));

function onSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) { render(allSongs); return; }
  filtered = allSongs.filter(s => {
    if (currentFilter === 'number') return String(s.number).includes(q);
    if (currentFilter === 'title')  return s.title.toLowerCase().includes(q);
    if (currentFilter === 'lyrics') return (s.lyrics||'').toLowerCase().includes(q) || (s.lyrics_full||'').toLowerCase().includes(q);
    return String(s.number).includes(q) || s.title.toLowerCase().includes(q) || (s.lyrics||'').toLowerCase().includes(q);
  });
  render(filtered);
}

function setFilter(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  onSearch();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  render(allSongs);
}

function render(songs) {
  filtered = songs;
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  document.getElementById('resultInfo').textContent = `총 ${songs.length}곡`;
  const list = document.getElementById('songList');
  if (!songs.length) { list.innerHTML = '<div class="no-result">검색 결과가 없습니다 🎵</div>'; return; }
  list.innerHTML = songs.map((s, idx) => `
    <div class="song-item" onclick="openModal(${idx})">
      <div class="song-num">${highlight(String(s.number), q)}</div>
      <div class="song-info">
        <div class="song-title">${highlight(s.title, q)}</div>
        ${s.lyrics ? `<div class="song-lyrics-preview">${highlight(truncate(s.lyrics, 60), q)}</div>` : ''}
      </div>
      <span class="song-arrow">›</span>
    </div>`).join('');
}

function highlight(text, q) {
  if (!q) return text;
  const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(safe, 'gi'), m => `<mark style="background:#f0e0ff;border-radius:2px">${m}</mark>`);
}
function truncate(str, n) { return str.length > n ? str.slice(0, n) + '…' : str; }

// ── 모달 ──
function openModal(idx) {
  currentIndex = idx;
  showSong(filtered[idx]);
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function showSong(song) {
  document.getElementById('modalTitle').textContent = `#${song.number}  ${song.title}`;
  loadScore(song);
  loadLyrics(song);
}

function loadScore(song) {
  const wrap = document.getElementById('modalScore');
  wrap.innerHTML = '<div class="modal-loading"><div class="spinner"></div>악보 로딩 중...</div>';

  const candidates = [`images/${song.number}.png`, `images/(${song.number}).png`];
  let tried = 0;
  const img = new Image();

  const tryNext = () => {
    if (tried >= candidates.length) {
      wrap.innerHTML = `<div class="modal-error">이미지를 불러올 수 없습니다.<br><small>${song.number}.png</small></div>`;
      return;
    }
    img.src = candidates[tried++];
  };

  img.onload = () => { wrap.innerHTML = ''; wrap.appendChild(img); };
  img.onerror = tryNext;
  tryNext();
}

function loadLyrics(song) {
  const content = document.getElementById('lyricsContent');
  const raw = song.lyrics_full || song.lyrics || '';
  if (!raw.trim()) {
    content.innerHTML = '<div class="no-lyrics">가사 정보가 없습니다.</div>';
    return;
  }

  // // = 절 구분, / = 줄 내 구분
  const lines = raw.split('\n').map(l => l.trim());
  const verses = [];
  let cur = [];

  for (const line of lines) {
    if (line === '//') {
      if (cur.length) { verses.push(cur); cur = []; }
    } else if (line === '/') {
      cur.push(null);
    } else if (line) {
      cur.push(line);
    }
  }
  if (cur.length) verses.push(cur);

  if (!verses.length) {
    content.innerHTML = '<div class="no-lyrics">가사 정보가 없습니다.</div>';
    return;
  }

  content.innerHTML = verses.map(verse =>
    `<div class="lyrics-verse">${verse.map(l =>
      l === null ? '<div class="lyrics-break"></div>' : `<div>${l}</div>`
    ).join('')}</div>`
  ).join('');

  // 가사 스크롤 맨 위로
  document.getElementById('modalLyrics').scrollTop = 0;
}

function navigate(dir) {
  const next = currentIndex + dir;
  if (next < 0 || next >= filtered.length) return;
  currentIndex = next;
  showSong(filtered[currentIndex]);
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('modal').classList.contains('open')) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft')  navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

window.addEventListener('scroll', () => {
  document.getElementById('topBtn').classList.toggle('show', window.scrollY > 400);
});

function debounce(fn, ms) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), ms); };
}

init();
</script>
</body>
</html>
